<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css/bootstrap.css">
        <link rel="stylesheet" href="./css/form.css">
        <script defer src="./js/form.js"></script>
        <title>Cadastro de Cliente</title>

        <title>ViaCEP Webservice</title>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />    
    </head>
    <body>
        <div class="container">
            <div class="divPai">
                <div class="divFilho rounded">
                    <form action="" method="post">

                        <div class="row">
                            <div class="col-md">
                                <h1 class="text-center">Cadastro de Cliente</h1>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <label for="" class="fs-6">Nome Completo</label>
                                <input name="nome" type="text" class="form-control" id="nome" oninput="formataNome(this)" required>
                            </div>

                            <div class="col-md-6">
                                <label for="" class="fs-6">E-mail</label>
                                <input name="email" type="text" class="form-control" maxlength="45" id="email" required>
                            </div>
                        </div>

                        <br>

                        <div class="row">
                            <div class="col-md-4">
                                <label for="" class="fs-6">CPF</label>
                                <input name="cpf" type="text" class="form-control" maxlength="14" id="cpf" oninput="formataCPF(this)" required>
                            </div>
                            
                            <div class="col-md-4">
                                <label for="" class="fs-6">Número de telefone</label>
                                <input name="telefone" type="text" class="form-control" maxlength="15" id="telefone" oninput="formataTelefone(this)" required>
                            </div>
                            
                            <div class="col-md-4">
                                <label for="" class="fs-6">Gênero</label>
                                <select name="genero" id="" class="form-select" required>
                                    <option value="" selected disabled hidden></option>
                                    <option value="masculino">Masculino</option>
                                    <option value="feminino">Feminino</option>
                                </select>
                            </div>
                        </div>

                        <br>

                        <div class="row">
                            <div class="col-md-3">
                                <label for="" class="fs-6">CEP</label>
                                <input name="cep" type="text" class="form-control" id="cep" onblur="pesquisacep(this.value);" oninput="formataCEP(this)" required>
                            </div>
                            <div class="col-md-6">
                                <label for="" class="fs-6">Nome da rua</label>
                                <input name="rua" type="text" class="form-control" id="rua" required>
                            </div>
                            <div class="col-md-3">
                                <label for="">Número</label>
                                <input name="numero" type="text" class="form-control" id="numero" required>
                            </div>
                        </div>

                        <br>

                        <div class="row">
                            <div class="col-md-4">
                                <label for="" class="fs-6">Bairro</label>
                                <input name="bairro" type="text" class="form-control" id="bairro" required>
                            </div>
                            <div class="col-md-4">
                                <label for="" class="fs-6">Cidade</label>
                                <input name="cidade" type="text" class="form-control" id="cidade" required>
                            </div>
                            <div class="col-md-4">
                                <label for="" class="fs-6">Estado</label>
                                <input name="estado" type="text" class="form-control" id="uf" required>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-center mt-4">
                            <input type="submit" class="btn btn-success" id="botao"></input>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
