<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script defer src="./js/site.js"></script>
        <script defer src="./js/bootstrap.js"></script>

        <link rel="stylesheet" href="./css/site.css">
        <link rel="stylesheet" href="./css/bootstrap.css">
        <title>Cálculo do INSS</title>
    </head>
    <body>
        <div class="container">
            <div class="div_pai">
                <div class="div_filho rounded">
                    <div class="row">
                        <div class="col-md-12 text-center"><h1>CÁLCULO DE INSS</h1></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label for="" class=""><h4>Insira seu salário: </h4></label>
                            <input type="text" class="form-control" id="salario">
                        </div>
                        <div class="col-md-6">
                            <label for="" class=""><h4>Insira o bônus(opcional): </h4></label>
                            <input type="text" class="form-control" id="bonus">
                        </div>

                    </div>

                    <br>

                    <div class="row">
                        <div class="col-md-12 text-center">
                            <span class="mensagem hide h5" id="mensagem"></span>
                            <table class="table table-dark hide" id="table">
                                <thead>
                                    <th scope="col">Salário (de)</th>
                                    <th scope="col">Salário (até)</th>
                                    <th scope="col">Alíquota</th>
                                    <th scope="col">Parcela a deduzir</th>
                                </thead>

                                <tbody id="tbody"></tbody>
                            </table>
                        </div>
                    </div>
                    
                    <br>

                    <div class="row">
                        <div class="col-md-12"><button class="form-control" onclick="calcular()">Calcular</button></div>
                    </div>
                </div>
            </div> 
        </div>
    </body>
</html>
