<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/bootstrap.css">
    <link rel="stylesheet" href="./css/site.css">
    <script defer src="./js/agc.js"></script>

    <title>Document</title>
</head>
<body>
    <div class="container-md">
        <div class="div_pai rounded">
            <div class="div_filho rounded border border-danger">
                <form action="post">
                    <!-- Nome e CPF -->
                    <div class="row">
                        <div class="col-md-6">
                            <label for="" class="col-form-label">Nome</label>
                            <input type="text" class="form-control" id="txtNome">
                        </div>
                        <div class="col-md-6">
                            <label for="" class="col-form-label">CPF</label>
                            <input type="text" class="form-control" id="txtCPF">
                        </div>
                    </div>
                    <!-- Embarque, Destino & Dias -->
                    <div class="row">
                        <div class="col-md-4">
                            <label for="" class="col-form-label">Embarque</label>
                            <select name="" id="slEmbarque" class="form-select">
                                <option value="">Selecione...</option>
                                <option value="1">Brasília</option>
                                <option value="2">São Paulo</option>
                                <option value="3">Paraná</option>
                                <option value="4">Curitiba</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="" class="col-form-label">Destino</label>
                            <select name="" id="slDestino" class="form-select" onchange="funHotel()" aria-placeholder="Selecione um...">
                                <option value="">Selecione...</option>
                                <option value="1">Manaus</option>
                                <option value="2">João Pessoa</option>
                                <option value="3">Cuiabá</option>
                                <option value="4">Campo Grande</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="" class="col-form-label">Quantidade de dias</label>
                            <input type="number" class="form-control" id="txtDias">
                        </div>
                    </div>
                    <!-- Transporte e Hospedagem -->
                    <div class="row">
                        <div class="col-md-3 text-center">
                            <label for="" class="col-form-label">Tipo de transporte</label>
                            <br>
                            <input type="checkbox" id="txtOnibus" class="form-check-input">
                            <label for="">Ônibus</label>
                            
                            <input type="checkbox" id="txtAvião" class="form-check-input">
                            <label for="">Avião</label>
                        </div>
                        <div class="col-md-3">
                            <label for="" class="col-form-label">Horário de Embarque</label>
                            <input type="time" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for=""class="col-form-label">Hospedagem</label>
                            <select name="" id="slHospedagem" class="form-select">
                                <option value="">Selecione um destino primeiro...</option>
                            </select>
                        </div>
                    </div>

                    <br> 

                    <div class="row">
                        <div class="col-md text-center">
                            <button onclick="apagar()" class="btn btn-danger">Apagar</button>
                            <button onclick="calcular()" class="btn btn-success">Calcular</button>
                        </div>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</body>
</html>
