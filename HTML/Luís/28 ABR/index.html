<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css/projetinho.css">
        <link rel="stylesheet" href="./css/bootstrap.css">
        <script defer src="./js/projetinho.js"></script>
        <title>ToDo</title>
    </head>
    <body>
        <div class="container">
            <div class="div_pai">
                <div class="div_filho">
                    <div class="row">
                        <h1 class="text-center">TO DO LIST</h1>
                    </div>
                    <div class="row">

                        <div class="col-md-10">
                            <input type="text" class="form-control" placeholder="Digite uma tarefa" id="inputText">
                        </div>

                        <div class="col-md-2">
                            <button onclick="add_item()" class="btn btn-success" id="botaoAdicionar">Adicionar</button>
                        </div>
                    </div>

                    <br>

                    <ul onclick="clean(event)" class="list-group" id="taskList">

                    </ul>

                </div>
            </div>
        </div>
    </body>
</html>
