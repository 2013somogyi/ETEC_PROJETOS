<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragão Pixel Art - Caça aos Pássaros</title>
    <style>
        body {
            margin: 0;
            background-color: #3b5d6f;
            height: 100vh;
            overflow: hidden;
            cursor: none;
            user-select: none;
        }

        .parallax-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            background-repeat: repeat-x;
            image-rendering: pixelated;
            pointer-events: none;
        }

        #layer-sky { height: 100vh; top: 0; background-image: url('./img/ceu1.jpg'); background-size: auto 100%; z-index: 0; }
        #layer-mountains { height: 550px; background-image: url('./img/montanhas1.png'); background-size: auto 100%; background-position: left bottom 80px; opacity: 0.7; z-index: 1; }
        #layer-trees { height: 400px; background-image: url('./img/arvore1.png'); background-size: auto 100%; bottom: 20px; background-position: left bottom; z-index: 2; }
        #layer-floor { height: 120px; background-image: url('./img/piso1.webp'); background-size: auto 100%; background-position: left bottom; z-index: 5; }

        #dragon-container {
            position: absolute;
            top: 0; left: 0;
            will-change: transform;
            pointer-events: none;
            z-index: 10;
        }

        #dragon-img {
            width: 180px; 
            image-rendering: pixelated; 
            animation: flap-animation 0.4s ease-in-out infinite alternate;
        }

        /* Estilo do Pássaro */
        .bird {
            position: absolute;
            width: 50px;
            image-rendering: pixelated;
            z-index: 8;
            transition: transform 0.1s linear;
        }

        .fire-pixel {
            position: absolute;
            width: 12px;
            height: 12px;
            pointer-events: none;
            z-index: 15;
            border-radius: 2px;
        }

        @keyframes flap-animation {
            from { transform: translateY(0px) rotate(-3deg); }
            to { transform: translateY(-15px) rotate(3deg); }
        }
    </style>
</head>
<body>

    <div id="layer-sky" class="parallax-layer"></div>
    <div id="layer-mountains" class="parallax-layer"></div>
    <div id="layer-trees" class="parallax-layer"></div>
    <div id="layer-floor" class="parallax-layer"></div>

    <div id="dragon-container">
        <img id="dragon-img" src="./img/dragao4.webp" alt="Dragão">
    </div>

    <script>
        const container = document.getElementById('dragon-container');
        const layers = {
            sky: document.getElementById('layer-sky'),
            mountains: document.getElementById('layer-mountains'),
            trees: document.getElementById('layer-trees'),
            floor: document.getElementById('layer-floor')
        };
        
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let dragonX = mouseX, dragonY = mouseY;
        let positions = { sky: 0, mountains: 0, trees: 0, floor: 0 };
        let isFiring = false, flip = 1;
        const fireColors = ['#ff4d00', '#ffae00', '#ffff00'];
        const birds = [];

        document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        document.addEventListener('mousedown', () => isFiring = true);
        document.addEventListener('mouseup', () => isFiring = false);

        // FUNÇÃO PARA CRIAR PÁSSAROS
        function spawnBird() {
            const bird = document.createElement('img');
            bird.src = './img/passaro.png'; // SINALIZAÇÃO: Use o nome correto da imagem do pássaro
            bird.className = 'bird';
            
            const side = Math.random() > 0.5 ? 1 : -1; 
            const startX = side === 1 ? -100 : window.innerWidth + 100;
            const startY = Math.random() * (window.innerHeight - 200) + 50;
            
            bird.style.left = startX + 'px';
            bird.style.top = startY + 'px';
            bird.style.transform = `scaleX(${-side})`; // Inverte a imagem conforme a direção
            
            document.body.appendChild(bird);
            
            const birdObj = {
                element: bird,
                x: startX,
                y: startY,
                speed: (Math.random() * 3 + 2) * side,
                alive: true
            };
            birds.push(birdObj);
        }

        // Spawn a cada 2 segundos
        setInterval(spawnBird, 2000);

        function createFire() {
            const fire = document.createElement('div');
            fire.className = 'fire-pixel';
            fire.style.backgroundColor = fireColors[Math.floor(Math.random() * fireColors.length)];
            
            let fireOffsetX = flip === 1 ? -60 : 60;
            let curX = dragonX + fireOffsetX;
            let curY = dragonY - 5;
            
            fire.style.left = curX + 'px';
            fire.style.top = curY + 'px';
            document.body.appendChild(fire);

            let vX = flip === 1 ? -(Math.random() * 12 + 8) : (Math.random() * 12 + 8);
            let vY = (Math.random() * 6 - 3);
            let op = 1;

            function move() {
                curX += vX; curY += vY; op -= 0.02;
                fire.style.left = curX + 'px';
                fire.style.top = curY + 'px';
                fire.style.opacity = op;

                // DETECÇÃO DE COLISÃO
                birds.forEach(bird => {
                    if (bird.alive) {
                        const bRect = bird.element.getBoundingClientRect();
                        if (curX > bRect.left && curX < bRect.right && curY > bRect.top && curY < bRect.bottom) {
                            burnBird(bird);
                            op = 0; // Extingue a partícula de fogo ao tocar
                        }
                    }
                });

                if (op > 0) requestAnimationFrame(move);
                else fire.remove();
            }
            move();
        }

        function burnBird(bird) {
            bird.alive = false;
            bird.element.style.filter = 'brightness(0) sepia(1) saturate(10000%) hue-rotate(-30deg)'; // Efeito de queimado
            
            let fallY = bird.y;
            function fall() {
                fallY += 10;
                bird.element.style.top = fallY + 'px';
                bird.element.style.transform += ' rotate(10deg)';
                if (fallY < window.innerHeight) requestAnimationFrame(fall);
                else {
                    bird.element.remove();
                    birds.splice(birds.indexOf(bird), 1);
                }
            }
            fall();
        }

        function animate() {
            dragonX += (mouseX - dragonX) * 0.1;
            dragonY += (mouseY - dragonY) * 0.1;

            if (mouseX > dragonX + 10) flip = -1;
            else if (mouseX < dragonX - 10) flip = 1;

            container.style.transform = `translate(${dragonX}px, ${dragonY}px) translate(-50%, -50%) scaleX(${flip})`;

            // Movimentação dos Pássaros
            birds.forEach((bird, index) => {
                if (bird.alive) {
                    bird.x += bird.speed;
                    bird.element.style.left = bird.x + 'px';
                    
                    // Remove se sair da tela
                    if (bird.x < -200 || bird.x > window.innerWidth + 200) {
                        bird.element.remove();
                        birds.splice(index, 1);
                    }
                }
            });

            // Parallax
            let diff = mouseX - (window.innerWidth / 2);
            let direction = diff > 0 ? -1 : 1;
            let speed = Math.abs(diff) * 0.02;

            positions.sky += direction * (speed * 0.1);
            positions.mountains += direction * (speed * 0.4);
            positions.trees += direction * (speed * 1.5);
            positions.floor += direction * (speed * 2.5);

            layers.sky.style.backgroundPosition = `${positions.sky}px 100%`;
            layers.mountains.style.backgroundPosition = `${positions.mountains}px bottom 80px`;
            layers.trees.style.backgroundPosition = `${positions.trees}px bottom`;
            layers.floor.style.backgroundPosition = `${positions.floor}px bottom`;

            if (isFiring) { createFire(); createFire(); }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
