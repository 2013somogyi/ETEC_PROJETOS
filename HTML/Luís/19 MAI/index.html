    <!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script defer src="./js/site.js"></script>
        <link rel="stylesheet" href="./css/site.css">
        <link rel="stylesheet" href="./css/bootstrap.css">
        <title>Cadastro de pessoas</title>
    </head>
    <body>
        <div class="container">
            <div class="div_pai">
                <div class="div_filho rounded">
                    <div class="row">
                        <h1 class="text-center">Cadastro</h1>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label for="" >Nome: </label>
                            <input type="text" class="form-control" id="nome">
                            <span class="mensagem-erro" id="erro-nome">
                                O nome é obrigatório
                            </span>
                        </div>
                        <div class="col-md-6">
                            <label for="" >Data de Nascimento: </label>
                            <input type="date" class="form-control" id="dataNascimento">
                            <span class="mensagem-erro" id="erro-data">
                                A data de nascimento é obrigatória
                            </span>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            
                            <label for="" >Sexo: </label>
                            <select name="" id="sexo" class="form-control">
                                <option value="" disabled selected hidden>Outro</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                            </select>
                            <span class="mensagem-erro" id="erro-sexo">
                                O sexo é obrigatório
                            </span>
                        </div>
                        <div class="col-md-6">
                            <label for="">Nacionalidade:</label>
                            <input type="text" class="form-control" id="nacionalidade">
                            <span class="mensagem-erro" id="erro-nacionalidade">
                                A nacionalidade é obrigatória
                            </span>
                        </div>
                    </div>

                    <br>

                    <div class="row">
                        <div class="col-12 col-md-4 mb-2 mb-md-0 d-grid">
                            <button class="btn btn-success btn-block" onclick="addCadastro()">Cadastrar</button>
                        </div>
                        <div class="col-12 col-md-4 mb-2 mb-md-0 d-grid">
                            <button class="btn btn-danger btn-block" onclick="rmvCadastro()">Limpar</button>
                        </div>
                        <div class="col-12 col-md-4 d-grid">
                            <button class="btn btn-primary btn-block" onclick="viewCadastro()">Consultar</button>
                        </div>
                    </div>

                    <br>

                    <table id="tabela" class="table">

                        <thead>
                            <th>Nome</th>
                            <th>Data de Nascimento</th>
                            <th>Sexo</th>
                            <th>Nacionalidade</th>
                        </thead>

                        <tbody id="tbody">
                        </tbody>

                    </table>
                    <p class="mensagem" id="mensagem"></p>
                </div>
            </div>
        </div>
    </body>
</html>
